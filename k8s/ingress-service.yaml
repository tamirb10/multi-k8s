apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: # תיקון ה-Typo מ-metadate
  name: ingress-service
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix # חובה בגרסה החדשה
            backend:
              service:
                name: client-cluster-ip-service # המבנה החדש
                port:
                  number: 3000
          - path: /api/?(.*) # עדכון ה-Path כדי שיתאים ל-Rewrite
            pathType: ImplementationSpecific
            backend:
              service:
                name: server-cluster-ip-service
                port:
                  number: 5000