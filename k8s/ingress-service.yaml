apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    kubernetes.io/ingress.class: nginx
    # הורדנו את ה-rewrite-target כדי למנוע עיוות נתיבים
spec:
  rules:
    - http:
        paths:
          # כל מה שמתחיל ב-api הולך לשרת כפי שהוא
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server-cluster-ip-service
                port:
                  number: 5000
          # כל השאר הולך לקליינט
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-cluster-ip-service
                port:
                  number: 3000