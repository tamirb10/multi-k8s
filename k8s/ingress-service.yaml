apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    kubernetes.io/ingress.class: nginx
    # הוספת ה-Rewrite הזה היא קריטית אם השרת שלך לא מצפה למילה /api בתוך הקוד שלו
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - http:
        paths:
          # כל מה שמתחיל ב-api יעבור לשרת, והמילה api תימחק מהנתיב שנשלח לשרת
          - path: /api/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: server-cluster-ip-service
                port:
                  number: 5000
          # כל שאר הבקשות ילכו לקליינט
          - path: /?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client-cluster-ip-service
                port:
                  number: 3000