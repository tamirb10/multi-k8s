apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    kubernetes.io/ingress.class: nginx
    # זה התיקון הקריטי: הוא לוקח את כל מה שאחרי ה-api ומעביר רק אותו
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - http:
        paths:
          # שים לב לסוגריים - הם אומרים ל-Ingress "תשמור את החלק הזה כ-$1"
          - path: /api/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: server-cluster-ip-service
                port:
                  number: 5000
          # הקליינט תמיד בסוף, כ-Catch-all
          - path: /?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client-cluster-ip-service
                port:
                  number: 3000

