apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    kubernetes.io/ingress.class: nginx
    # שים לב: הורדנו את ה-rewrite הכללי מה-metadata כי הוא משבש את ה-Client
spec:
  rules:
    - http:
        paths:
          # נתיב ל-API - כאן אנחנו רוצים את ה-Rewrite
          - path: /api/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: server-cluster-ip-service
                port:
                  number: 5000
          
          # נתיב ל-Client - בלי Rewrite ובלי Regex מסובך
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-cluster-ip-service
                port:
                  number: 3000